<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Global Layout List - Lists</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #070711;
        color: #f5f2ff;
        font-family: Inter, system-ui, sans-serif;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(36px, 8vw, 76px);
        line-height: 0.95;
      }

      a {
        display: block;
        border: 1px solid rgba(184, 127, 255, 0.28);
        border-radius: 8px;
        padding: 16px;
        color: inherit;
        text-decoration: none;
        font-weight: 900;
        background: rgba(255, 255, 255, 0.05);
      }

      a:hover {
        border-color: rgba(44, 230, 255, 0.62);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lists</h1>
      <a href="classic/">Classic</a>
      <a href="challenges/">Challenges</a>
      <a href="spams/">Spams</a>
      <a href="impossibles/">Impossibles</a>
      <a href="future/">Future List</a>
    </main>
  </body>
</html>
